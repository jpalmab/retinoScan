{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'pacientes.css' %}">
    <title>Crear Paciente</title>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar">
        <span class="navbar-brand">RetinaScan RPD</span>
        <div class="navbar-right">
            <span>Sesión activa</span>
            <form method="POST" action="{% url 'aplication:logout' %}">
                {% csrf_token %}
                <button type="submit" class="btn-cerrar-sesion">Cerrar Sesión</button>
            </form>
        </div>
    </nav>

    <!-- Layout -->
    <div class="layout">

        <!-- Sidebar -->
        <aside class="sidebar">
            <a href="{% url 'aplication:crear_paciente' %}" class="active">Crear Paciente</a>
            <a href="{% url 'aplication:lista_pacientes' %}">Historial de Pacientes</a>
        </aside>

        <!-- Contenido -->
        <main class="main-content">
            <div class="form-card">
                <h2>Crear Paciente</h2>

                <form method="POST">
                    {% csrf_token %}

                    <div class="form-grid">

                        <div class="form-group">
                            <label>Nombre</label>
                            <input type="text" name="nombre" required>
                        </div>

                        <div class="form-group">
                            <label>Apellidos</label>
                            <input type="text" name="apellidos" required>
                        </div>

                        <div class="form-group">
                            <label>Cedula / Documento</label>
                            <input type="text" name="cedula" required>
                        </div>

                        <div class="form-group">
                            <label>Fecha de nacimiento</label>
                            <input type="date" name="fecha_nacimiento" required>
                        </div>

                        <div class="form-group">
                            <label>Sexo</label>
                            <select name="sexo" required>
                                <option value="">Seleccionar</option>
                                <option value="M">Masculino</option>
                                <option value="F">Femenino</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label>Teléfono</label>
                            <input type="text" name="telefono">
                        </div>

                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" name="email">
                        </div>

                        <div class="form-group full-width">
                            <label>Dirección</label>
                            <input type="text" name="direccion">
                        </div>

                        <div class="form-group">
                            <label>Seguro médico</label>
                            <input type="text" name="seguro_medico">
                        </div>

                        <div class="form-group">
                            <label>Grupo sanguíneo</label>
                            <select name="grupo_sanguineo">
                                <option value="">Seleccionar</option>
                                <option value="A+">A+</option>
                                <option value="A-">A-</option>
                                <option value="B+">B+</option>
                                <option value="B-">B-</option>
                                <option value="AB+">AB+</option>
                                <option value="AB-">AB-</option>
                                <option value="O+">O+</option>
                                <option value="O-">O-</option>
                            </select>
                        </div>

                        <div class="form-group full-width">
                            <label>Alergias / Observaciones</label>
                            <textarea name="alergias_observaciones"></textarea>
                        </div>

                    </div>

                    <div class="form-actions">
                        <button type="button" class="btn-outline">Subir Examen OCT</button>
                        <button type="reset" class="btn-outline">Limpiar</button>
                        <button type="submit" class="btn-primary-action">Guardar Paciente</button>
                    </div>

                </form>
            </div>
        </main>
    </div>

</body>
</html>
